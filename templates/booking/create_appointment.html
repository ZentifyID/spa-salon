{% extends "base.html" %}

{% block title %}Онлайн-запись - SPA Salon{% endblock %}

{% block content %}
<section>
    <h1>Онлайн-запись</h1>
    <p>Оставьте заявку, и администратор подтвердит время визита.</p>
    <form method="post" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Отправить заявку</button>
    </form>
</section>
{% endblock %}
